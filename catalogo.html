<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Catálogo — Ótica Horizonte</title>
<meta content="Catálogo de armações, óculos de sol e acessórios da Ótica Horizonte" name="description"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0d2b4e 0%,#1a4a7a 100%);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-img{width:56px;height:56px;border-radius:50%;object-fit:contain;background:#f8fafc;padding:4px;border:2px solid rgba(201,168,76,0.5)}
.logo-text h1{color:#e8c96a;font-size:20px;font-weight:800;letter-spacing:0.5px}
.logo-text p{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px}
.header-badge{background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);border-radius:20px;padding:6px 14px;color:#e8c96a;font-size:12px;font-weight:600}

/* FILTROS */
.filtros-bar{background:white;border-bottom:2px solid #e2e8f0;padding:14px 20px;position:sticky;top:88px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.filtros-inner{max-width:1200px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filtro-btn{padding:8px 18px;border-radius:20px;border:2px solid #e2e8f0;background:white;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.filtro-btn:hover{border-color:#1a4a7a;color:#1a4a7a}
.filtro-btn.active{background:#0d2b4e;border-color:#0d2b4e;color:white}
.search-box{flex:1;min-width:200px;max-width:320px;position:relative}
.search-box input{width:100%;padding:8px 14px 8px 36px;border:2px solid #e2e8f0;border-radius:20px;font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#1a4a7a}
.search-box::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}

/* GRID */
.main{max-width:1200px;margin:0 auto;padding:24px 16px}
.resultado-info{color:#64748b;font-size:13px;margin-bottom:16px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

/* CARD */
.card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.card-foto{width:100%;height:200px;object-fit:contain;background:#f8fafc;cursor:zoom-in;transition:opacity .2s}
.card-foto:hover{opacity:0.9}
.card-no-foto{width:100%;height:200px;background:linear-gradient(135deg,#e2e8f0,#cbd5e1);display:flex;align-items:center;justify-content:center;font-size:56px}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px}
.card-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b}
.card-nome{font-size:15px;font-weight:800;color:#0d2b4e;line-height:1.3}
.card-info{font-size:12px;color:#94a3b8}
.card-footer{padding:12px 14px;border-top:1px solid #f1f5f9}
.btn-wpp{width:100%;padding:10px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.btn-wpp:hover{opacity:0.9}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty h3{font-size:18px;font-weight:700;color:#64748b;margin-bottom:8px}

/* FOOTER */
.footer{background:#0d2b4e;color:rgba(255,255,255,0.6);text-align:center;padding:20px;font-size:12px;margin-top:40px}
.footer strong{color:#e8c96a}

/* ZOOM MODAL */
.zoom-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.zoom-overlay.open{display:flex}
.zoom-img{max-width:95vw;max-height:88vh;object-fit:contain;border-radius:8px}
.zoom-close{position:fixed;top:16px;right:16px;background:#dc2626;color:white;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.zoom-desc{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:white;font-size:14px;font-weight:600;background:rgba(0,0,0,0.6);padding:8px 20px;border-radius:20px}

/* VENDEDOR BADGE */
.vendedor-badge{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:12px;padding:4px 12px;color:#c9a84c;font-size:11px;font-weight:700}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card-foto,.card-no-foto{height:160px}
  .logo-text h1{font-size:16px}
  .filtros-inner{gap:6px}
  .filtro-btn{padding:6px 12px;font-size:12px}
}
</style>
</head>

<header class="header">

<input id="busca" oninput="renderCatalogo()" placeholder="Buscar produto..." type="text"/>

</div>
</div>

<main class="main">
<div class="resultado-info" id="resultado-info"></div>
<div class="grid" id="grid-catalogo"></div>
</main>
<!-- FOOTER -->
<footer class="footer">
<p>© 2026 <strong>Ótica Horizonte</strong> — CNPJ 64.448.745/0001-09</p>

</footer>

// ── Firebase ──────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyDK2rBr4xO1v2O7p4Cclz8rU-XRdZu4PRw",
  authDomain: "otica-horizonte.firebaseapp.com",
  projectId: "otica-horizonte",
  storageBucket: "otica-horizonte.firebasestorage.app",
  messagingSenderId: "192666792141",
  appId: "1:192666792141:web:395c4896169c0d50757984"
};

var _produtos = [];
var _firebaseOk = false;

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Logo
  document.getElementById('logo-img').src = LOGO_B64;

  // Params
  var vendLogin = getParam('v');
  _wpp = getParam('w');

  if (_wpp) {
    document.getElementById('vendedor-badge').style.display = '';
    document.getElementById('vendedor-badge').textContent = '👤 Atendimento personalizado';
  }

  // Carregar produtos do localStorage primeiro (fallback)
  carregarProdutosLocal();

  // Tentar Firebase
  carregarFirebase();
});

function carregarProdutosLocal() {
  try {
    var raw = localStorage.getItem('otica_produtos');
    if (raw) {
      _produtos = JSON.parse(raw) || [];
      renderCatalogo();
    }
  } catch(e) {}
}

async function carregarFirebase() {
  try {
    // Importar Firebase dinamicamente
    var { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
    var { getFirestore, collection, getDocs } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');

    var app = initializeApp(firebaseConfig, 'catalogo');
    var db = getFirestore(app);

    var snap = await getDocs(collection(db, 'produtos'));
    if (!snap.empty) {
      _produtos = [];
      snap.forEach(function(doc) {
        var d = doc.data();
        if (d && d.items) _produtos = d.items;
        else if (Array.isArray(d)) _produtos = d;
      });
      _firebaseOk = true;
      renderCatalogo();
    }
  } catch(e) {
    console.log('Firebase nao disponivel, usando localStorage');
  }
}

// ── Filtro ────────────────────────────────────────────────
function filtrar(cat, btn) {
  _filtroAtivo = cat;
  document.querySelectorAll('.filtro-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderCatalogo();
}

// ── Render ────────────────────────────────────────────────
function renderCatalogo() {
  var busca = (document.getElementById('busca').value || '').toLowerCase();

  var lista = _produtos.filter(function(p) {
    // Apenas categorias do catálogo
    var catOk = CATS_CATALOGO.some(function(c){ return (p.cat||'').toLowerCase().includes(c.toLowerCase()); });
    if (!catOk) return false;

    // Apenas marcados para catálogo (ou sem o campo = compatibilidade)
    if (p.catalogo === false) return false;

    // Filtro de categoria
    if (_filtroAtivo !== 'todos') {
      if (!((p.cat||'').toLowerCase().includes(_filtroAtivo.toLowerCase()))) return false;
    }

    // Busca
    if (busca) {
      var texto = ((p.desc||'') + ' ' + (p.marca||'') + ' ' + (p.modelo||'') + ' ' + (p.cor||'')).toLowerCase();
      if (!texto.includes(busca)) return false;
    }

    return true;
  });

  document.getElementById('resultado-info').textContent = lista.length + ' produto' + (lista.length !== 1 ? 's' : '') + ' encontrado' + (lista.length !== 1 ? 's' : '');

  if (lista.length === 0) {
    document.getElementById('grid-catalogo').innerHTML = (
      '<div class="empty" style="grid-column:1/-1">' +
      '<div class="empty-icon">🔍</div>' +
      '<h3>Nenhum produto encontrado</h3>' +
      '<p>Tente outro filtro ou termo de busca</p>' +
      '</div>'
    );
    return;
  }

  document.getElementById('grid-catalogo').innerHTML = lista.map(function(p) {
    var fotoHtml = p.foto
      ? '<img class="card-foto" src="' + p.foto + '" alt="' + (p.desc||'') + '" onclick="abrirZoom(\'' + p.foto.replace(/'/g, "\\'") + '\',\'' + (p.desc||'').replace(/'/g, "\\'") + '\')" loading="lazy"/>'
      : '<div class="card-no-foto">🕶️</div>';

    var infoExtra = [p.marca, p.modelo, p.cor].filter(Boolean).join(' · ');

    var msgWpp = encodeURIComponent(
      'Olá! Vi no catálogo da Ótica Horizonte e tenho interesse no modelo:\n' +
      '🕶️ *' + (p.desc||p.cod) + '*' +
      (p.marca ? '\nMarca: ' + p.marca : '') +
      (p.modelo ? '\nModelo: ' + p.modelo : '') +
      (p.cor ? '\nCor: ' + p.cor : '') +
      '\n\nPoderia me passar mais informações?'
    );

    var btnWpp = _wpp
      ? '<button class="btn-wpp" onclick="window.open(\'https://wa.me/' + _wpp + '?text=' + msgWpp + '\',\'_blank\')">📱 Quero este modelo</button>'
      : '<button class="btn-wpp" style="background:linear-gradient(135deg,#64748b,#475569)" onclick="alert(\'Entre em contato: (92) 99289-0085\')">📞 Pedir orçamento</button>';

    return (
      '<div class="card">' +
      fotoHtml +
      '<div class="card-body">' +
      '<div class="card-cat">' + (p.cat||'') + '</div>' +
      '<div class="card-nome">' + (p.desc||'') + '</div>' +
      (infoExtra ? '<div class="card-info">' + infoExtra + '</div>' : '') +
      '</div>' +
      '<div class="card-footer">' + btnWpp + '</div>' +
      '</div>'
    );
  }).join('');
}

// ── Zoom ──────────────────────────────────────────────────
function abrirZoom(src, desc) {
  document.getElementById('zoom-img').src = src;
  document.getElementById('zoom-desc').textContent = desc || '';
  document.getElementById('zoom-overlay').classList.add('open');
}

function fecharZoom() {
  document.getElementById('zoom-overlay').classList.remove('open');
  document.getElementById('zoom-img').src = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') fecharZoom();
});
</script>
